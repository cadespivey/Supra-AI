<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" role="img" aria-label="Supra AI splash screen">
  <title>Supra AI splash screen</title>
  <desc>Uses Equity A typography when available; PNG exports include the font rendered into the pixels. The section symbol uses Equity A Bold.</desc>
  <rect width="100%" height="100%" fill="rgb(11,35,64)"/>
  <g text-anchor="middle" font-family="'Equity A', Equity, Georgia, 'Times New Roman', serif">
    <text x="1920.00" y="1015.10" font-size="283.20" font-weight="700" fill="rgb(201,162,75)">§</text>
    <text x="1920.00" y="1201.54" font-size="86.40" font-weight="400" fill="rgb(255,255,255)">Supra AI</text>
    <text x="1920.00" y="1275.17" font-size="43.20" font-weight="400" fill="rgba(255,255,255,0.8784)">Secure legal AI without compromise.</text>
    <text x="1920.00" y="1337.57" font-size="43.20" font-style="italic" font-weight="400" fill="rgba(201,162,75,0.9412)">See Supra.</text>
  </g>
</svg>
