name: Verify model catalog IDs

# Guards against shipping a model the picker can't download: every curated repoID in
# ModelCatalog / EmbeddingModelCatalog must resolve on Hugging Face (HTTP 200). HF
# returns 401 for a nonexistent repo, which otherwise only surfaces as a failed
# in-app download. Runs on catalog/script changes, weekly (to catch upstream repo
# removals or renames over time), and on demand.

on:
  push:
    branches: [main]
    paths:
      - "Packages/SupraSessions/Sources/SupraSessions/ModelCatalog.swift"
      - "Packages/SupraSessions/Sources/SupraSessions/EmbeddingModelCatalog.swift"
      - "Scripts/verify-model-ids.sh"
      - ".github/workflows/verify-model-ids.yml"
  pull_request:
    paths:
      - "Packages/SupraSessions/Sources/SupraSessions/ModelCatalog.swift"
      - "Packages/SupraSessions/Sources/SupraSessions/EmbeddingModelCatalog.swift"
      - "Scripts/verify-model-ids.sh"
      - ".github/workflows/verify-model-ids.yml"
  schedule:
    - cron: "17 8 * * 1" # Mondays 08:17 UTC — catch upstream repo removals/renames
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Verify model catalog structure without provider dependency
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: bash Scripts/verify-model-ids.sh --offline
      - name: Verify catalog model IDs resolve on Hugging Face
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: bash Scripts/verify-model-ids.sh
