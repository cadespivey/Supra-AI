name: Scheduled document benchmarks

on:
  schedule:
    - cron: "41 10 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic-baseline:
    name: Document benchmark baseline and drift
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run deterministic benchmark and verify frozen baseline
        run: bash Scripts/run-benchmarks.sh --verify-baseline
