name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "Scripts/verify-public-font-license.sh"
      - "Scripts/verify-public-repository-assets.sh"
      - "Tests/Scripts/Fixtures/PublicRepositoryAssets/**"
      - "Tests/Scripts/test-verify-public-repository-assets.sh"
      - "Docs/Website-Asset-Licensing.md"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: website

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Reject prohibited font assets
        run: bash ../Scripts/verify-public-font-license.sh

      - name: Test public repository metadata guard
        run: bash ../Tests/Scripts/test-verify-public-repository-assets.sh

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Run deterministic website gates
        run: bash ../Scripts/test-website.sh "$PWD"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ./website/out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
